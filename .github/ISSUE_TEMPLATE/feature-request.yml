name: Feature Request
description: 신규 기능이나 개선 요청 기록
title: "[Feature] "
labels:
  - type: feature
  - status: needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: 배경
      description: 어떤 문제를 해결하려는지 작성
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 기능이나 변경 사항 작성
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 수용 기준
      description: 완료 판단 기준 작성
      placeholder: |
        - 사용자는 ...
        - 시스템은 ...
